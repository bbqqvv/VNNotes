name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # Quality Gates: Runs in parallel
  # ==========================================
  quality-gates:
    name: Parallel Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci

      - name: Security Scan (npm audit)
        run: npm audit --audit-level=high

      - name: Lint Next.js & TypeScript
        run: npm run lint

  # ==========================================
  # Build Matrix: Tests on multiple Node versions
  # Runs ONLY if quality-gates pass
  # ==========================================
  build:
    name: Build Next.js & VitePress
    needs: quality-gates
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        
      - name: Install VitePress Dependencies
        working-directory: ./wiki-site
        run: npm ci

      - name: Build VitePress Docs
        working-directory: ./wiki-site
        run: npm run docs:build

  # ==========================================
  # Deployment Stages: Complex Graph execution
  # ==========================================
  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Placeholder Staging Deploy
        run: echo "🚀 Deploying to Staging Environment via Vercel CLI / Webhooks..."

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    # Only run on main branch pushes
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Placeholder Production Deploy
        run: echo "✅ Deploying to Production via Vercel CLI / Webhooks..."
